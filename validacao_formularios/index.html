<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Validação de Formulário</title>
  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="mb-4">Cadastro</h2>

  <form>

    <!-- Nome -->
    <div class="mb-3">
      <label>Nome</label>
      <input type="text" class="form-control" required>
    </div>

    <!-- CPF -->
    <div class="mb-3">
      <label>CPF</label>
      <input type="text" id="cpf" class="form-control" required>
      <small id="cpfMsg"></small>
    </div>

    <!-- CEP -->
    <div class="mb-3">
      <label>CEP</label>
      <input type="text" id="cep" class="form-control" required>
    </div>

    <!-- Endereço -->
    <div class="mb-3">
      <label>Endereço</label>
      <input type="text" id="endereco" class="form-control" required>
    </div>

    <!-- Número -->
    <div class="mb-3">
      <label>Número</label>
      <input type="number" class="form-control" required>
    </div>

    <!-- Complemento -->
    <div class="mb-3">
      <label>Complemento (opcional)</label>
      <input type="text" class="form-control">
    </div>

    <!-- Bairro -->
    <div class="mb-3">
      <label>Bairro</label>
      <input type="text" id="bairro" class="form-control" required>
    </div>

    <!-- Cidade -->
    <div class="mb-3">
      <label>Cidade</label>
      <input type="text" id="cidade" class="form-control" required>
    </div>

    <!-- Estado -->
    <div class="mb-3">
      <label>Estado</label>
      <input type="text" id="estado" class="form-control" required>
    </div>

    <button class="btn btn-primary">Enviar</button>

  </form>
</div>

<script>

// LISTA DE ENDEREÇOS
const enderecos = [
  {
    cep: "87000-000",
    endereco: "Rua Exemplo",
    bairro: "Centro",
    cidade: "Sarandi",
    estado: "PR"
  },
  {
    cep: "01001-000",
    endereco: "Praça da Sé",
    bairro: "Sé",
    cidade: "São Paulo",
    estado: "SP"
  }
];

// MÁSCARA CEP
document.getElementById("cep").addEventListener("input", function (e) {
  let valor = e.target.value.replace(/\D/g, "");

  if (valor.length > 5) {
    valor = valor.slice(0, 5) + "-" + valor.slice(5, 8);
  }

  e.target.value = valor;
});

// AUTO PREENCHIMENTO
document.getElementById("cep").addEventListener("blur", function () {
  let cep = this.value;

  let resultado = enderecos.find(e => e.cep === cep);

  if (resultado) {
    document.getElementById("endereco").value = resultado.endereco;
    document.getElementById("bairro").value = resultado.bairro;
    document.getElementById("cidade").value = resultado.cidade;
    document.getElementById("estado").value = resultado.estado;
  }
});

// MÁSCARA CPF
document.getElementById("cpf").addEventListener("input", function (e) {
  let valor = e.target.value.replace(/\D/g, "");

  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
  valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");

  e.target.value = valor;
});

// VALIDAÇÃO CPF
function validarCPF(cpf) {
  cpf = cpf.replace(/\D/g, "");

  if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;

  let soma = 0;
  let resto;

  for (let i = 1; i <= 9; i++) {
    soma += parseInt(cpf.substring(i-1, i)) * (11 - i);
  }

  resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;
  if (resto !== parseInt(cpf.substring(9, 10))) return false;

  soma = 0;
  for (let i = 1; i <= 10; i++) {
    soma += parseInt(cpf.substring(i-1, i)) * (12 - i);
  }

  resto = (soma * 10) % 11;
  if (resto === 10 || resto === 11) resto = 0;

  return resto === parseInt(cpf.substring(10, 11));
}

// MOSTRAR RESULTADO CPF
document.getElementById("cpf").addEventListener("blur", function () {
  let cpf = this.value;
  let msg = document.getElementById("cpfMsg");

  if (validarCPF(cpf)) {
    msg.textContent = "CPF válido";
    msg.style.color = "green";
  } else {
    msg.textContent = "CPF inválido";
    msg.style.color = "red";
  }
});

</script>

</body>
</html>
